<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>2019 Working Days</title>
    <meta name="description" content="The final CloudFirst countdown">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" type="image/x-icon" href="/img/nd.ico">
    <style>
        body {
            background-color: #001f42;
            font-family: 'Galaxie Polaris', -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen-Sans,Ubuntu,Cantarell,"Helvetica Neue",sans-serif;
            text-align: center;
        }
    
        h1 {
            color: #fff;
            font-weight: 500;
            font-size: 20vh;
            line-height: 1.5;
            margin: 26vh 0 0;
        }
    
        h2 {
            color: #dcb439;
            font-family: 'Galaxie Polaris Condensed', -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen-Sans,Ubuntu,Cantarell,"Helvetica Neue",sans-serif;
            font-size: 5vh;
            font-weight: normal;
            letter-spacing: .1em;
            margin: 0;
            text-transform: uppercase;
        }
    </style>
    <script>
        var eoyDate = "12/23/2019";
    
        var holidayDates = [
            "9/2/2019",
            "11/28/2019",
            "11/29/2019"
        ];
    
        function todaysDate() {
            var now = new Date(),
                month = now.getMonth() + 1,
                day = now.getDate(),
                year = now.getFullYear();
            return month + "/" + day + "/" + year;
        }
    
        function parseDate(date) {
            var inputType = typeof date;
    
            if (inputType === "string") {
                var mdy = date.split('/');
                return new Date(mdy[2], mdy[0]-1, mdy[1]);
            } else {
                return date;
            }
        }
    
        function offsetDay(inputDate, offset) {
            var offsetDate = parseDate(inputDate);
            offsetDate.setDate(offsetDate.getDate() + offset);
    
            return offsetDate;
        }
    
        function dateDiff(first, second) {
            var firstDate = parseDate(first),
                secondDate = parseDate(second);
    
            return Math.round((secondDate-firstDate)/(1000*60*60*24));
        }
    
        function isWeekendDay(inputDate){
            var date = parseDate(inputDate),
                day = inputDate.getDay();
    
            if (day === 0 || day === 6) {
                return true;
            } else {
                return false;
            }
        }
    
        function isHoliday(inputDate){
            var date = parseDate(inputDate);
    
            for (var i = 0; i < holidayDates.length; i++) {
                if (dateDiff(date, holidayDates[i]) === 0) {
                    return true;
                }
            }
        }

        function log(value){
            if (document.cookie == "debug=true") {
                console.log(value);
            }
        }
    
        function remainingDays(){
            var today = todaysDate(),
                dayCount = dateDiff(today, eoyDate),
                remaining = dayCount;
    
            log(today);
            log(dayCount);
    
            if (dayCount > 0) {
                for (var i = 0; i < dayCount; i++) {
                    var scanDate = offsetDay(today, i);
                    log(scanDate);
    
                    if (isWeekendDay(scanDate)) {
                        remaining -= 1;
                        log("weekend");
                        continue;
                    }
    
                    if (isHoliday(scanDate)) {
                        remaining -= 1;
                        log("holiday");
                    }
                }
    
                return remaining;
            } else {
                return 0
            }
        }
    
        function updateCount(){
            var count = remainingDays();
    
            document.getElementById("workingDays").innerHTML = count;
        }
    </script>
  </head>
  <body onload="updateCount()">
      <h1 id="workingDays">
          0
          <noscript>Please enable JavaScript to get an accurate count</noscript>
      </h1>
      <h2>Working days left in 2019</h2>
  </body>
</html>
