<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0f1115" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f7f7f2" media="(prefers-color-scheme: light)" />
  <title>Sun Tzu on Strategy</title>
  <style>
    html {
      font-size: clamp(16px, 1vw + 14px, 20px);
    }

    :root {
      --bg: #f7f7f2;
      --font-serif: "ElsevierGulliver", Georgia, "Times New Roman", serif;
      --text: #1f1f1f;
      color-scheme: light dark;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1115;
        --text: #f3f4f6;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      display: grid;
      margin: 0;
      min-height: 100vh;
      padding: 2rem;
      place-items: center;
    }

    figure {
      max-width: 58ch;
      width: min(100%, 760px);
    }

    blockquote {
      font-family: "ElsevierGulliver-Italic", var(--font-serif);
      font-size: 2.5rem;
      font-style: italic;
      line-height: 1.15;
      margin: 0;
      position: relative;
      text-wrap: balance;
    }

    blockquote::before {
      content: "“";
      left: -0.48em;
      line-height: 1;
      position: absolute;
      top: 0;
      transform: translateY(0.09cap);
    }

    .rq {
      left: -0.07em;
      position: relative;
      top: 0.03em;
    }

    figcaption {
      font-family: "Nexus Sans Pro", "Helvetica Neue", Arial, sans-serif;
      font-size: 1rem;
      letter-spacing: 0.18em;
      margin-top: 1.5rem;
      opacity: 0.78;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <figure>
    <blockquote>
      Tactics without strategy is the noise before defeat.<span class="rq">”</span>
    </blockquote>
    <figcaption>Sun Tzu</figcaption>
  </figure>
</body>
</html>
