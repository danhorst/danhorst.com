[build]
publish = "output"
command = "npm install && npm run esbuild && bundle exec bridgetown build"

[[headers]]
  for = "/font/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[build.environment]
RUBY_VERSION = "4.0.2"
BUNDLE_VERSION = "4.0.9"

[context.deploy-preview]
command = "npm install && npm run esbuild && bundle exec bridgetown build"
