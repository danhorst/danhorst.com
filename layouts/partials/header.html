<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en-us" }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="description" content="The personal website of Dan Horst">
    <meta name="theme-color" content="#fffff8">

    <title>{{ .Title }}</title>
    {{ with .Site.Params.description }}<meta name="description" content="{{ . }}">{{ end }}
    {{ with .Site.Params.author }}<meta name="author" content="{{ . }}">{{ end }}

    <link rel="stylesheet" href="{{ .Site.BaseURL }}css/main.css">
    <link rel="apple-touch-icon" href="/img/icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <script>
      if ('serviceWorker' in navigator) {
	navigator.serviceWorker.register('/js/sw.js').then((reg) => {
	  console.log('Registered service worker', reg);
	}).catch((err) => {
	  console.log('Service worker unavailable', err);
	});
      }
    </script>
    {{ if .RSSLink -}}<link href="{{ .RSSLink }}" rel="feed" type="application/rss+xml" title="{{ .Site.Title }}">{{- end }}
    {{ .Hugo.Generator }}
  </head>
  <body>
    <header>
      <a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
      <nav>
	<ul>
	  {{ range .Site.Menus.main }}
	  <li><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
	  {{ end }}
	</ul>
      </nav>
    </header>
