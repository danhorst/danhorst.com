{{ define "title" }}
  Blog
{{ end }}

{{ define "header" }}
  <nav role="navigation">
    <span><a href="/">Dan Horst</a></span>
    <ul>
      <li>Blog</li>
      <li><a href="/lists/">Lists</a></li>
      <li><a href="/about/">About</a></li>
    </ul>
  </nav>
{{ end }}

{{ define "main" }}
  <h1>Blog</h1>
  <ul class="listing">
    {{ range .Paginator.Pages }}
    <li><span class="post-time">{{ .Date.Format "2006-01-02" }}</span> <a href="{{ .Permalink }}">{{.Title}}</a></li>
    {{ end }}
  </ul>
{{ end }}
